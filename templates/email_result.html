<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background:#0a0a0a; font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a; padding:40px 20px;">
<tr><td align="center">
<table width="560" cellpadding="0" cellspacing="0" style="background:#141414; border-radius:12px; overflow:hidden;">

  <!-- Header -->
  <tr>
    <td style="padding:32px 40px 16px; text-align:center;">
      <h1 style="margin:0; font-size:28px; color:#a8e63d; font-family:Arial,sans-serif;">
        CLIPPAR
      </h1>
    </td>
  </tr>

  <!-- Body -->
  <tr>
    <td style="padding:16px 40px 32px; color:#e0e0e0; font-size:16px; line-height:1.6;">
      <p>Hey {{name}},</p>
      <p>Your highlight reel is ready! We've clipped and merged your best shots into one clean video.</p>
      <p style="text-align:center; margin:28px 0;">
        <a href="{{drive_link}}"
           style="display:inline-block; padding:14px 32px; background:#a8e63d; color:#0a0a0a;
                  text-decoration:none; border-radius:8px; font-weight:bold; font-size:16px;">
          Download Your Highlight Reel
        </a>
      </p>
      <p style="color:#888; font-size:14px;">
        The link above opens your video on Google Drive. You can download it, share it, or watch it right there.
      </p>
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="padding:20px 40px; border-top:1px solid #222; text-align:center;
               color:#555; font-size:12px;">
      Clippar — Your golf, distilled.
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>

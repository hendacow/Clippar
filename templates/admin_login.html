<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clippar Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'DM Sans', sans-serif;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #141414; border: 1px solid #222; border-radius: 12px;
          padding: 40px; width: 360px; text-align: center; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #a8e63d; margin-bottom: 24px; }
  input { width: 100%; padding: 12px 16px; border: 1px solid #333; border-radius: 8px;
          background: #1a1a1a; color: #e0e0e0; font-size: 1rem; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #a8e63d; }
  button { width: 100%; padding: 12px; border: none; border-radius: 8px;
           background: #a8e63d; color: #0a0a0a; font-weight: 700; font-size: 1rem; cursor: pointer; }
  button:hover { background: #b8f04d; }
  .error { color: #ff6b6b; font-size: 0.9rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Clippar Admin</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="POST" action="/admin/login">
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Log In</button>
  </form>
</div>
</body>
</html>
